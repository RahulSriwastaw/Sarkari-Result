    <script>
      // Fix for sandboxed fetch getter
      (function() {
        try {
          const orig = window.fetch;
          Object.defineProperty(window, 'fetch', {
            get: function() { return orig ? orig.bind(window) : undefined; },
            set: function(val) { /* ignore to prevent Cannot set property error */ },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          console.warn('Could not patch window.fetch', e);
        }
        try {
          if (typeof globalThis !== 'undefined') {
            const origG = globalThis.fetch;
            Object.defineProperty(globalThis, 'fetch', {
              get: function() { return origG ? origG.bind(globalThis) : undefined; },
              set: function(val) { },
              configurable: true,
              enumerable: true
            });
          }
        } catch(e) {}
      })();
    </script>
